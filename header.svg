  <!-- ORBIT PATH -->
  <ellipse cx="175" cy="158" rx="130" ry="52" fill="none" stroke="#00ff87"
           stroke-width="0.7" stroke-dasharray="5,8" opacity="0.20"/>

  <!-- RADAR SWEEP -->
  <g clip-path="url(#earth-clip)">
    <circle cx="175" cy="158" r="24" fill="none" stroke="#00ff87" stroke-width="0.6" opacity="0.28"/>
    <circle cx="175" cy="158" r="48" fill="none" stroke="#00ff87" stroke-width="0.6" opacity="0.18"/>
    <circle cx="175" cy="158" r="72" fill="none" stroke="#00ff87" stroke-width="0.6" opacity="0.10"/>
    <line x1="175" y1="158" x2="247" y2="158" stroke="#00ff87" stroke-width="1.8" opacity="0.75">
      <animateTransform attributeName="transform" type="rotate"
                        from="0 175 158" to="360 175 158" dur="3.8s" repeatCount="indefinite"/>
    </line>
    <path d="M 175,158 L 247,158 A 72,72 0 0 1 218,224 Z" fill="#00ff87" opacity="0.06">
      <animateTransform attributeName="transform" type="rotate"
                        from="0 175 158" to="360 175 158" dur="3.8s" repeatCount="indefinite"/>
    </path>
  </g>
  <circle cx="175" cy="158" r="3.5" fill="#00ff87" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
  </circle>

  <!-- SATELLITE -->
  <g filter="url(#glow)">
    <animateMotion dur="9s" repeatCount="indefinite" rotate="auto">
      <mpath xlink:href="#orb"/>
    </animateMotion>
    <rect x="-8"  y="-4"   width="16" height="8"  rx="1.5" fill="#00ff87"/>
    <rect x="-24" y="-2.5" width="14" height="5"  rx="1"   fill="#60efff" opacity="0.90"/>
    <rect x="10"  y="-2.5" width="14" height="5"  rx="1"   fill="#60efff" opacity="0.90"/>
    <line x1="0" y1="-4" x2="0" y2="-11" stroke="white" stroke-width="0.9" opacity="0.70"/>
    <circle cx="0" cy="-12" r="1.8" fill="white" opacity="0.70"/>
    <circle cx="0" cy="0"   r="2.2" fill="white" opacity="0.95"/>
  </g>

  <!-- Data pulse -->
  <line x1="175" y1="88" x2="175" y2="158" stroke="#00ff87" stroke-width="1"
        stroke-dasharray="3,4">
    <animate attributeName="opacity" values="0;0.55;0" dur="2.8s" repeatCount="indefinite" begin="0.8s"/>
  </line>

  <!-- RIGHT SIDE TEXT -->

  <!-- Status pill -->
  <g transform="translate(338, 26)">
    <rect width="185" height="25" rx="12.5" fill="#00ff87" fill-opacity="0.08"
          stroke="#00ff87" stroke-width="0.85" stroke-opacity="0.40"/>
    <circle cx="17" cy="12.5" r="5" fill="#00ff87">
      <animate attributeName="opacity" values="1;0.15;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="30" y="17.5" font-family="Courier New, monospace" font-size="11"
          fill="#00ff87" font-weight="bold" letter-spacing="1">CLIMATE OPS ONLINE</text>
  </g>

  <!-- SHARUN -->
  <text x="340" y="100" font-family="Arial Black, Arial, sans-serif" font-size="48"
        font-weight="900" fill="#ffffff" filter="url(#tglow)" letter-spacing="4">SHARUN</text>

  <!-- TOMY -->
  <text x="340" y="150" font-family="Arial Black, Arial, sans-serif" font-size="48"
        font-weight="900" fill="#00ff87" filter="url(#tglow)" letter-spacing="4">TOMY</text>

  <!-- Divider -->
  <line x1="340" y1="165" x2="845" y2="165" stroke="#00ff87" stroke-width="0.65" opacity="0.22"/>

  <!-- Subtitle -->
  <text x="340" y="186" font-family="Courier New, monospace" font-size="12.5"
        fill="#60efff" opacity="0.88" letter-spacing="0.5">
    Climate Intelligence · Satellite AI · Green Finance Systems
  </text>

  <!-- STAT CARDS row 1 -->
  <!-- Card 1: Bonds -->
  <g transform="translate(340, 202)">
    <rect width="116" height="52" rx="7" fill="#00ff87" fill-opacity="0.07"
          stroke="#00ff87" stroke-width="0.85" stroke-opacity="0.32"/>
    <text x="58" y="25" font-family="Courier New, monospace" font-size="19"
          font-weight="bold" fill="#00ff87" text-anchor="middle" filter="url(#glow)">1,345+</text>
    <text x="58" y="42" font-family="Courier New, monospace" font-size="9"
          fill="#8b949e" text-anchor="middle">Bonds Verified</text>
  </g>
  <!-- Card 2: Greenwashing -->
  <g transform="translate(464, 202)">
    <rect width="116" height="52" rx="7" fill="#ff4757" fill-opacity="0.07"
          stroke="#ff4757" stroke-width="0.85" stroke-opacity="0.32"/>
    <text x="58" y="25" font-family="Courier New, monospace" font-size="19"
          font-weight="bold" fill="#ff6b7a" text-anchor="middle" filter="url(#glow)">156</text>
    <text x="58" y="42" font-family="Courier New, monospace" font-size="9"
          fill="#8b949e" text-anchor="middle">Greenwashing Flagged</text>
  </g>
  <!-- Card 3: NASA -->
  <g transform="translate(588, 202)">
    <rect width="130" height="52" rx="7" fill="#ffd700" fill-opacity="0.07"
          stroke="#ffd700" stroke-width="0.85" stroke-opacity="0.32"/>
    <text x="65" y="23" font-family="Courier New, monospace" font-size="11.5"
          font-weight="bold" fill="#ffd700" text-anchor="middle" filter="url(#glow)">NASA Runner-Up</text>
    <text x="65" y="42" font-family="Courier New, monospace" font-size="9"
          fill="#8b949e" text-anchor="middle">Space Apps Challenge 2025</text>
  </g>
  <!-- Card 4: Publication -->
  <g transform="translate(726, 202)">
    <rect width="116" height="52" rx="7" fill="#60efff" fill-opacity="0.07"
          stroke="#60efff" stroke-width="0.85" stroke-opacity="0.32"/>
    <text x="58" y="23" font-family="Courier New, monospace" font-size="11.5"
          font-weight="bold" fill="#60efff" text-anchor="middle" filter="url(#glow)">Published</text>
    <text x="58" y="37" font-family="Courier New, monospace" font-size="9"
          fill="#8b949e" text-anchor="middle">Research Paper</text>
    <text x="58" y="48" font-family="Courier New, monospace" font-size="9"
          fill="#8b949e" text-anchor="middle">Accepted Jun 2026</text>
  </g>

  <!-- Tagline + cursor -->
  <text x="340" y="290" font-family="Courier New, monospace" font-size="10.5" fill="#484f58">
    &gt; "climate accountability should be impossible to fake"
  </text>
  <rect x="790" y="279" width="8" height="12" fill="#00ff87" opacity="0.85">
    <animate attributeName="opacity" values="0.85;0;0.85" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Corner grid decoration (top right) -->
  <g stroke="#00ff87" stroke-width="0.5" fill="none" opacity="0.07">
    <line x1="760" y1="0"  x2="760" y2="85"/>
    <line x1="810" y1="0"  x2="810" y2="85"/>
    <line x1="860" y1="0"  x2="860" y2="85"/>
    <line x1="720" y1="0"  x2="860" y2="0"/>
    <line x1="720" y1="42" x2="860" y2="42"/>
    <line x1="720" y1="85" x2="860" y2="85"/>
    <polyline points="845,0 860,0 860,15"/>
  </g>
  <!-- Corner bracket (bottom left) -->
  <g stroke="#00ff87" stroke-width="0.5" fill="none" opacity="0.07">
    <polyline points="0,305 0,320 15,320"/>
  </g>

</svg>
